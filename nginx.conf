# Nginx configuration for ColdSync Pro
# Docker: auto-mounted at /etc/nginx/conf.d/default.conf
# Manual: copy to /etc/nginx/sites-available/coldsync and symlink to sites-enabled/

upstream coldsync_backend {
    server web:8000;          # Docker service name; use 127.0.0.1:8000 for manual deploy
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # ── SSL ──────────────────────────────────────────────────
    # Option A — Let's Encrypt (certbot):
    #   certbot --nginx -d your-domain.com -d www.your-domain.com
    # Option B — Self-signed / custom cert:
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Static files (Django collectstatic) ──────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files (uploaded images, QR codes) ──────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SSE — must come BEFORE /api/ to override buffering ───
    location /api/notifications/stream/ {
        proxy_pass         http://coldsync_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        add_header         Cache-Control no-cache;
        add_header         X-Accel-Buffering no;
    }

    # ── Django API ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://coldsync_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── React SPA (catch-all) ─────────────────────────────────
    # index.html is served from frontend/dist (copied into staticfiles by Dockerfile)
    # For Docker: Dockerfile copies frontend/dist → /app/frontend/dist
    # collectstatic copies Django static files to /app/staticfiles
    # We serve the SPA directly from the dist folder
    location / {
        root   /app/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
    }
}
