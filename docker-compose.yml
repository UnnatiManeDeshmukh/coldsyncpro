version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-coldsync_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             cp -r /app/frontend/dist/. /app/frontend_dist/ 2>/dev/null || true &&
             gunicorn coldsync.wsgi:application --config gunicorn.conf.py"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_files:/app/media:ro
      - static_files:/app/staticfiles:ro
      - frontend_dist:/app/frontend/dist:ro   # React SPA — served directly by nginx
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  frontend_dist:
  logs:
